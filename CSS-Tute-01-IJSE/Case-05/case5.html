<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="IJSE Web CSS Tute 01">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Tute Case 01</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>
        section{
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(4 , 1fr);
        }

        section > div{
            border: 1px solid black;
        }

        #div1{
            background-color: red;
        }

        #div2{
            background-color: green;
        }

        #div3{
            background-color: orangered;
        }

        #div4{
            background-color: darkviolet;
        }

        #div5{
            background-color: deeppink;
        }

        #div6{
            background-color: blue;
        }

        #div7{
            background-color: brown;
        }

        #div8{
            background-color: violet;
        }

        #div9{
            background-color: darkmagenta;
        }

        #div10{
            background-color: yellow;
        }

        #div11{
            background-color: dodgerblue;
        }

        #div12{
            background-color: darkslateblue;
        }

    </style>

</head>

<body>
    <section>
        <div id="div1"></div>
        <div id="div2"></div>
        <div id="div3"></div>
        <div id="div4"></div>
        <div id="div5"></div>
        <div id="div6"></div>
        <div id="div7"></div>
        <div id="div8"></div>
        <div id="div9"></div>
        <div id="div10"></div>
        <div id="div11"></div>
        <div id="div12"></div>
    </section>
</body>

</html>
