<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="IJSE Web CSS Tute 01">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Tute Case 01</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>

        section{
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
            position: relative;
        }

        #sectionOne > div{
            background-color: coral;
        }

        section p{
            margin-top: 250px;
            font-size: 100px;
            align-self: center;
        }

        section div{
            position: sticky;
            top: 0;
            padding: 30px;
            color: white;
            font-size: 20px;
        }

        #sectionTwo{
            background-color: dodgerblue;
        }

        #sectionTwo > div{
            background-color: darkblue;
        }

        #sectionThree{
            background-color: gray;
        }

        #sectionThree > div{
            background-color: black;
        }

        #sectionFour{
            background-color: orange;
        }

        #sectionFour > div{
            background-color: orangered;
        }

    </style>

</head>

<body>
    <section id="sectionOne">
        <div>Card 1</div>
        <p>Hello</p>
    </section>

    <section id="sectionTwo">
        <div>Card 2</div>
        <p>How</p>
    </section>

    <section id="sectionThree">
        <div>Card 3</div>
        <p>Are</p>
    </section>

    <section id="sectionFour">
        <div>Card 4</div>
        <p>You...?</p>
    </section>
</body>

</html>
